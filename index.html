<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SC Blueprint Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⬡</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0e17;--bg2:#111827;--cd:#1a2236;--ac:#3b82f6;--tx:#e2e8f0;--mu:#94a3b8;--dm:#64748b;--bd:#1e293b;--gn:#22c55e;--am:#f59e0b}
body{font-family:'JetBrains Mono','Fira Code','Consolas','SF Mono',monospace;font-size:13px;background:var(--bg);color:var(--tx);min-height:100vh;max-width:900px;margin:0 auto}
input{font-family:inherit}
button{font-family:inherit;cursor:pointer}
a{color:var(--ac)}

.header{background:var(--bg2);border-bottom:1px solid var(--bd);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{font-size:18px;color:var(--ac)}
.logo-text{font-weight:700;font-size:14px;color:var(--ac)}
.header-right{display:flex;align-items:center;gap:6px}
.player-badge{font-size:11px;color:var(--mu);background:var(--cd);padding:3px 8px;border-radius:6px}
.stat-green{font-size:11px;color:var(--gn);font-weight:700}
.stat-dim{font-size:11px;color:var(--dm)}
.icon-btn{background:none;border:none;color:var(--mu);font-size:16px;padding:4px;min-width:40px;min-height:40px;display:flex;align-items:center;justify-content:center}

.progress{padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--bd)}
.progress-bar{height:6px;border-radius:3px;background:var(--bd);overflow:hidden;display:flex}
.progress-gn{background:var(--gn);transition:width .3s}
.progress-am{background:var(--am);transition:width .3s}
.progress-stats{display:flex;justify-content:space-between;margin-top:3px;font-size:10px}

.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--bd)}
.tab{flex:1;padding:12px 0;border:none;border-bottom:3px solid transparent;background:transparent;color:var(--dm);font-size:13px;font-weight:400;min-height:44px}
.tab.active{color:var(--ac);font-weight:700;border-bottom-color:var(--ac)}

.search-bar{padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;gap:6px}
.search-input{flex:1;padding:10px 14px;border-radius:10px;font-size:14px;border:1px solid var(--bd);background:var(--cd);color:var(--tx);outline:none;min-height:44px;width:100%}
.filter-btn{min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;border-radius:10px;border:2px solid var(--bd);background:transparent;color:var(--dm);font-size:12px;padding:0 14px}
.filter-btn.active{border-color:var(--ac);background:rgba(59,130,246,.15);color:var(--ac)}

.filters{padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;flex-wrap:wrap;gap:4px}
.fbtn{padding:7px 10px;border-radius:8px;font-size:11px;border:1px solid var(--bd);background:transparent;color:var(--mu);min-height:34px}
.fbtn.active{border-color:var(--ac);background:rgba(59,130,246,.15);color:var(--ac)}

.count{padding:6px 16px;font-size:10px;color:var(--dm);border-bottom:1px solid var(--bd)}

.set-row{border-bottom:1px solid var(--bd);cursor:pointer}
.set-row.expanded{background:var(--cd)}
.set-header{display:flex;align-items:center;gap:10px;padding:12px 16px}
.set-info{flex:1;min-width:0}
.set-name{font-weight:700;font-size:14px}
.set-name.done{color:var(--gn)}
.set-type{font-size:9px;color:var(--dm);background:var(--bg);padding:2px 6px;border-radius:4px;margin-left:6px}
.set-complete{font-size:9px;color:var(--gn);font-weight:700;background:rgba(34,197,94,.1);padding:2px 6px;border-radius:4px;margin-left:4px}
.dots{display:flex;gap:2px;margin-top:4px;flex-wrap:wrap}
.dot{width:7px;height:7px;border-radius:50%;background:var(--bd)}
.dot.owned{background:var(--gn)}
.dot.wanted{background:var(--am)}
.set-count{text-align:right;flex-shrink:0}
.set-count-main{font-size:14px;font-weight:700}
.set-count-main.done{color:var(--gn)}
.set-count-wanted{font-size:10px;color:var(--am)}

.bb{min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;border-radius:10px;border:2px solid var(--bd);background:transparent;color:var(--dm);font-size:18px;flex-shrink:0;padding:0;text-decoration:none}
.bb.active-gn{border-color:var(--gn);background:rgba(34,197,94,.15);color:var(--gn)}
.bb.active-am{border-color:var(--am);background:rgba(245,158,11,.15);color:var(--am)}
.bb.active-ac{border-color:var(--ac);background:rgba(59,130,246,.15);color:var(--ac)}

.set-detail{padding:0 8px 12px}
.set-actions{display:flex;gap:6px;margin-bottom:8px;padding:0 8px;flex-wrap:wrap}
.set-actions .bb{min-width:auto;min-height:38px;padding:0 12px;font-size:11px;border-radius:8px}

.item-row{display:flex;align-items:center;gap:8px;padding:4px 8px;border-bottom:1px solid rgba(30,41,59,.08)}
.item-bar{width:4px;height:30px;border-radius:2px;background:var(--bd);flex-shrink:0}
.item-bar.owned{background:var(--gn)}
.item-bar.wanted{background:var(--am)}
.item-name{font-size:12px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item-name.owned{color:var(--gn)}
.item-name.wanted{color:var(--am)}

.empty{text-align:center;padding:60px 20px;color:var(--dm)}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty-text{font-size:14px;font-weight:600}

.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:var(--bg2);border:1px solid var(--bd);border-radius:16px;padding:32px;max-width:360px;width:100%;text-align:center}
.login-icon{font-size:32px;margin-bottom:8px}
.login-title{font-size:18px;font-weight:700;color:var(--ac);margin-bottom:4px}
.login-sub{font-size:11px;color:var(--dm);margin-bottom:24px}
.login-label{font-size:13px;color:var(--mu);margin-bottom:12px}
.login-input{width:100%;padding:12px 16px;border-radius:10px;font-size:16px;border:2px solid var(--bd);background:var(--cd);color:var(--tx);outline:none;margin-bottom:12px;text-align:center}
.login-input:focus{border-color:var(--ac)}
.login-btn{width:100%;padding:14px;border-radius:10px;font-size:14px;font-weight:700;border:none;background:var(--bd);color:var(--dm);min-height:48px}
.login-btn.ready{background:var(--ac);color:#fff;cursor:pointer}
.login-hint{font-size:10px;color:var(--dm);margin-top:16px}

.footer{text-align:center;padding:24px 16px;color:var(--dm);font-size:10px;border-top:1px solid var(--bd)}

.themes{background:var(--bg2);border-bottom:1px solid var(--bd);padding:8px 16px;display:flex;flex-wrap:wrap;gap:4px}
.theme-btn{padding:8px 12px;border-radius:8px;font-size:12px;border:2px solid var(--bd);background:var(--cd);color:var(--mu);min-height:38px}
.theme-btn.active{border-color:var(--ac);background:rgba(59,130,246,.15);color:var(--ac)}
</style>
</head>

<script>
// ═══ FIREBASE CONFIG ═══
firebase.initializeApp({
  apiKey: "AIzaSyBzUUwfgfMtTOHneqbPILyQk5L5sV_OIX0",
  authDomain: "scbp-tracker.firebaseapp.com",
  databaseURL: "https://scbp-tracker-default-rtdb.europe-west1.firebasedatabase.app",

  messagingSenderId: "530276090175",
  appId: "1:530276090175:web:0685d5ca1e6251fc60938a"

const db = firebase.database();

// ═══ DATA — 353 real blueprints from sccrafter.com ═══
const A_RAW=["ADP Arms Woodland","ADP Core","ADP Legs Woodland","ADP-mk4 Arms Woodland","ADP-mk4 Core Woodland","ADP-mk4 Helmet Woodland","ADP-mk4 Legs Woodland","Antium Arms","Antium Arms Jet","Antium Arms Maroon","Antium Arms Moss Camo","Antium Arms Sand","Antium Arms Storm","Antium Core","Antium Core Jet","Antium Core Maroon","Antium Core Moss Camo","Antium Core Sand","Antium Core Storm","Antium Helmet","Antium Helmet Jet","Antium Helmet Maroon","Antium Helmet Moss Camo","Antium Helmet Sand","Antium Helmet Storm","Antium Legs","Antium Legs Jet","Antium Legs Maroon","Antium Legs Moss Camo","Antium Legs Sand","Antium Legs Storm","Arden-SL Arms","Arden-SL Core","Arden-SL Helmet","Arden-SL Legs","Argus Helmet","Aril Arms","Aril Core","Aril Helmet","Aril Legs","Artimex Arms","Artimex Arms (Modified)","Artimex Arms Canuto","Artimex Arms Lodestone","Artimex Arms Wildwood","Artimex Core","Artimex Core (Modified)","Artimex Core Canuto","Artimex Core Lodestone","Artimex Core Wildwood","Artimex Helmet","Artimex Helmet Canuto","Artimex Helmet Lodestone","Artimex Helmet Wildwood","Artimex Legs","Artimex Legs Canuto","Artimex Legs Lodestone","Artimex Legs Wildwood","Aves Arms","Aves Core","Aves Helmet","Aves Legs","Aves Shrike Arms","Aves Shrike Core","Aves Shrike Helmet","Aves Shrike Legs","Badami Helmet","Balor HCH Helmet","Calico Arms Tactical","Calico Core Tactical","Calico Helmet Tactical","Calico Legs Tactical","Carnifex Armor Core","Carnifex Armor Legs","CBH-3 Helmet Base","Citadel Arms Base","Citadel Core Base","Citadel Legs Base","Corbel Arms Halcyon","Corbel Arms Mire","Corbel Arms Patina","Corbel Arms Smolder","Corbel Core Halcyon","Corbel Core Mire","Corbel Core Patina","Corbel Core Smolder","Corbel Helmet Halcyon","Corbel Helmet Mire","Corbel Helmet Patina","Corbel Helmet Smolder","Corbel Legs Halcyon","Corbel Legs Mire","Corbel Legs Patina","Corbel Legs Smolder","Defiance Arms Tactical","Defiance Core Tactical","Defiance Helmet Tactical","Defiance Legs Tactical","Dust Devil Armor Arms","Dust Devil Armor Core","Dust Devil Armor Legs","DustUp Arms Tactical","DustUp Core Tactical","DustUp Helmet Tactical","DustUp Legs Tactical","Fortifier Helmet Base","G-2 Helmet Woodland","Geist Armor Arms","Geist Armor Arms Desert","Geist Armor Arms Forest","Geist Armor Arms Rogue","Geist Armor Arms Whiteout","Geist Armor Core","Geist Armor Core Desert","Geist Armor Core Forest","Geist Armor Core Rogue","Geist Armor Core Whiteout","Geist Armor Helmet","Geist Armor Helmet Desert","Geist Armor Helmet Forest","Geist Armor Helmet Rogue","Geist Armor Helmet Whiteout","Geist Armor Legs","Geist Armor Legs Desert","Geist Armor Legs Forest","Geist Armor Legs Rogue","Geist Armor Legs Whiteout","Horizon Helmet","Inquisitor Arms Black","Inquisitor Arms Grey","Inquisitor Core Black","Inquisitor Core Grey","Inquisitor Legs Black","Inquisitor Legs Grey","Lynx Arms","Lynx Core","Lynx Legs","Manticore Helmet","Monde Arms","Monde Arms Crimson Camo","Monde Arms Daimyo","Monde Arms Delta Camo","Monde Arms Hemlock Camo","Monde Arms Hiro","Monde Core","Monde Core Crimson Camo","Monde Core Daimyo","Monde Core Delta Camo","Monde Core Hemlock Camo","Monde Core Hiro","Monde Helmet","Monde Helmet Crimson Camo","Monde Helmet Daimyo","Monde Helmet Delta Camo","Monde Helmet Hiro","Monde Legs","Monde Legs Crimson Camo","Monde Legs Daimyo","Monde Legs Delta Camo","Monde Legs Hemlock Camo","Monde Legs Hiro","Morningstar Helmet Icefall","Morozov-SH Arms","Morozov-SH Arms Thule","Morozov-SH Core","Morozov-SH Core Thule","Morozov-SH Helmet","Morozov-SH Helmet Thule","Morozov-SH Legs","Morozov-SH Legs Thule","Novikov Exploration Suit","Novikov Helmet","Oracle Helmet","ORC-mkV Arms","ORC-mkV Core","ORC-mkV Legs","ORC-mkX Arms Woodland","ORC-mkX Core Woodland","ORC-mkX Helmet Woodland","ORC-mkX Legs Woodland","Overlord Arms Supernova","Overlord Core Supernova","Overlord Helmet Supernova","Overlord Legs Supernova","PAB-1 Arms","PAB-1 Core","PAB-1 Legs","Palatino Arms","Palatino Arms Daystar","Palatino Arms Metropolis","Palatino Arms Moonfall","Palatino Arms Sunstone","Palatino Core","Palatino Core Daystar","Palatino Core Metropolis","Palatino Core Moonfall","Palatino Core Sunstone","Palatino Helmet","Palatino Helmet Daystar","Palatino Helmet Metropolis","Palatino Helmet Moonfall","Palatino Helmet Sunstone","Palatino Legs","Palatino Legs Daystar","Palatino Legs Metropolis","Palatino Legs Moonfall","Palatino Legs Sunstone","Pembroke Exploration Suit","Pembroke Helmet","Piecemeal Armor Arms","Piecemeal Armor Core","Piecemeal Armor Legs","Siebe Helmet","Stirling Exploration Suit","Strata Arms","Strata Core","Strata Helmet Shooting Star","Strata Legs","Testudo Arms","Testudo Arms Clanguard","Testudo Arms Combustion","Testudo Arms Earthshake","Testudo Arms Nightveil","Testudo Arms Turfwar","Testudo Core","Testudo Core Clanguard","Testudo Core Combustion","Testudo Core Earthshake","Testudo Core Nightveil","Testudo Core Turfwar","Testudo Helmet","Testudo Helmet Clanguard","Testudo Helmet Combustion","Testudo Helmet Earthshake","Testudo Helmet Nightveil","Testudo Helmet Turfwar","Testudo Legs","Testudo Legs Clanguard","Testudo Legs Combustion","Testudo Legs Earthshake","Testudo Legs Nightveil","Testudo Legs Turfwar","TrueDef-Pro Arms","TrueDef-Pro Core Base","TrueDef-Pro Legs","Venture Arms","Venture Core","Venture Legs"];

const W_RAW=["A03 Sniper Rifle","Arclight Desert Shadow Pistol","Arclight Herrero Pistol","Arclight Midnight Pistol","Arclight Nightstalker Pistol","Arclight Pistol","Arclight Stormfall Pistol","Arclight Warhawk Pistol","Arrowhead Sniper Rifle","Atzkav Igniter Sniper Rifle","Atzkav Mirage Sniper Rifle","Atzkav Sniper Rifle","BR-2 Shotgun","C54 SMG","Coda Big Boss Pistol","Coda Nighthawk Pistol","Coda Pistol","Custodian Midnight SMG","Custodian Scorched SMG","Custodian SMG","Deadrig Shotgun","Devastator Midnight Shotgun","Devastator Shotgun","Devastator Warhawk Shotgun","F55 LMG","Fresnel Energy LMG","Fresnel Icebox Energy LMG","Fresnel Rockfall Energy LMG","FS-9 LMG","Gallant Rifle","Karna Brimstone Rifle","Karna Fate Rifle","Karna Rager Rifle","Karna Rifle","Karna Valor Rifle","Killshot Rifle","LH86 Pistol","Lumin V SMG","P6-LR Sniper Rifle","P8-AR Rifle","P8-SC SMG","Parallax Energy Assault Rifle","Parallax Sanguine Energy Assault Rifle","Parallax Shock Trooper Energy Assault Rifle","Parallax Sunstone Energy Assault Rifle","Prism Bonedust Laser Shotgun","Prism Deep Sea Laser Shotgun","Prism Firesteel Laser Shotgun","Prism Laser Shotgun","Pulse Blacklist Pistol","Pulse Laser Pistol","Pulse Rouge Pistol","Pulverizer LMG","Quartz Black Op Energy SMG","Quartz Deadfall Energy SMG","Quartz Energy SMG","Quartz Lumen Energy SMG","R97 Kismet Shotgun","R97 Righteous Shotgun","R97 Scorched Shotgun","R97 Shotgun","Ravager-212 Twin Shotgun","Ripper Sunblock SMG","S71 Rifle","Scalpel Sniper Rifle","Tripledown Pistol","Yubarev Igniter Pistol","Yubarev Mirage Pistol","Yubarev Pistol","Zenith Landslide Laser Sniper Rifle","Zenith Laser Sniper Rifle","Zenith Thunderstrike Laser Sniper Rifle"];

const AM_RAW=["A03 Sniper Rifle Magazine (15 cap)","Arclight Pistol Battery (30 cap)","Arrowhead Sniper Rifle Battery (16 cap)","Atzkav Sniper Rifle Battery (8 cap)","BR-2 Shotgun Magazine (12 cap)","C54 SMG Magazine (50 cap)","Coda Pistol Magazine (6 cap)","Custodian SMG Magazine (60 cap)","Deadrig Shotgun Magazine (8 cap)","Devastator Shotgun Battery (12 cap)","F55 LMG Magazine (150 cap)","Fresnel Energy LMG Battery (165 Cap)","FS-9 Magazine (75 cap)","Gallant Rifle Battery (45 cap)","Karna Rifle Battery (35 cap)","Killshot Rifle Magazine (45 Cap)","Lumin V SMG Battery (45 cap)","P6-LR Magazine (8 cap)","P8-AR Rifle Magazine (15 Cap)","P8-SC SMG Magazine (45 cap)","Parallax Rifle Battery (80 Cap)","Prism Laser Shotgun Battery (20 cap)","Pulse Laser Pistol Battery (60 Cap)","Pulverizer LMG Magazine (120 Cap)","Quartz Energy SMG Battery (45 cap)","R97 Shotgun Magazine (18 cap)","Ravager-212 Twin Shotgun Magazine (16 cap)","S71 Rifle Magazine (30 cap)","Scalpel Sniper Rifle Magazine (12 cap)","Tripledown Pistol Magazine (12 Cap)","Yubarev Pistol Battery (10 cap)","Zenith Laser Sniper Rifle Battery (22 Cap)"];

const TOTAL_BP = A_RAW.length + W_RAW.length + AM_RAW.length;

// ═══ PARSE SETS ═══
const SLOTS=["Helmet","Core","Arms","Legs","Exploration Suit"];
function parseArmor(){const m={};let id=1;A_RAW.forEach(name=>{let sb=null,sl=null;for(const s of SLOTS){if(name.includes(` ${s}`)){sb=name.slice(0,name.indexOf(` ${s}`));sl=s;break;}}if(!sb){sb=name;sl="Piece";}if(!m[sb])m[sb]=[];m[sb].push({id:id++,name,slot:sl});});return Object.entries(m).map(([b,items])=>({id:'a-'+b.replace(/[^a-zA-Z0-9]/g,''),name:b,items})).sort((a,b)=>a.name.localeCompare(b.name));}

const W_BASES={"A03 Sniper Rifle":"Sniper","Arclight Pistol":"Pistol","Arrowhead Sniper Rifle":"Sniper","Atzkav Sniper Rifle":"Sniper","BR-2 Shotgun":"Shotgun","C54 SMG":"SMG","Coda Pistol":"Pistol","Custodian SMG":"SMG","Deadrig Shotgun":"Shotgun","Devastator Shotgun":"Shotgun","F55 LMG":"LMG","Fresnel Energy LMG":"LMG","FS-9 LMG":"LMG","Gallant Rifle":"Rifle","Karna Rifle":"Rifle","Killshot Rifle":"Rifle","LH86 Pistol":"Pistol","Lumin V SMG":"SMG","P6-LR Sniper Rifle":"Sniper","P8-AR Rifle":"Rifle","P8-SC SMG":"SMG","Parallax Energy Assault Rifle":"Rifle","Prism Laser Shotgun":"Shotgun","Pulse Laser Pistol":"Pistol","Pulverizer LMG":"LMG","Quartz Energy SMG":"SMG","R97 Shotgun":"Shotgun","Ravager-212 Twin Shotgun":"Shotgun","Ripper Sunblock SMG":"SMG","S71 Rifle":"Rifle","Scalpel Sniper Rifle":"Sniper","Tripledown Pistol":"Pistol","Yubarev Pistol":"Pistol","Zenith Laser Sniper Rifle":"Sniper"};

function parseWeapons(){const fam={};let id=5000;Object.keys(W_BASES).forEach(b=>{fam[b]={t:W_BASES[b],items:[]};});W_RAW.forEach(w=>{if(fam[w]){fam[w].items.push({id:id++,name:w,slot:"Weapon"});return;}const bk=Object.keys(fam).sort((a,b)=>b.length-a.length);for(const b of bk){if(w.split(" ")[0]===b.split(" ")[0]){fam[b].items.push({id:id++,name:w,slot:"Weapon"});return;}}});return Object.entries(fam).map(([b,d])=>({id:'w-'+b.replace(/[^a-zA-Z0-9]/g,''),name:b,type:d.t,items:d.items})).sort((a,b)=>a.name.localeCompare(b.name));}

function parseAmmo(){let id=9000;return AM_RAW.map(a=>({id:id++,name:a}));}

const ARMOR_SETS=parseArmor();
const WEAPON_SETS=parseWeapons();
const AMMO_LIST=parseAmmo();
const ALL_IDS=[...ARMOR_SETS.flatMap(s=>s.items.map(i=>i.id)),...WEAPON_SETS.flatMap(s=>s.items.map(i=>i.id)),...AMMO_LIST.map(a=>a.id)];

// ═══ STATE ═══
let state={player:null,owned:new Set(),wanted:new Set(),favs:new Set(),tab:'armor',search:'',statusF:'All',incOnly:false,favOnly:false,showFi:false,showTh:false,exp:null};

// ═══ FIREBASE SYNC ═══
let fbRef=null;
function initFB(name){
  const key=name.toLowerCase().replace(/[^a-z0-9]/g,'_');
  fbRef=db.ref('players/'+key);
  fbRef.on('value',snap=>{
    const d=snap.val();
    if(d){
      state.owned=new Set(d.owned||[]);
      state.wanted=new Set(d.wanted||[]);
      state.favs=new Set(d.favs||[]);
    }
    render();
  });
}
function saveFB(){
  if(!fbRef)return;
  fbRef.set({owned:[...state.owned],wanted:[...state.wanted],favs:[...state.favs]});
}

function toggleOwned(id){
  if(state.owned.has(id))state.owned.delete(id);else state.owned.add(id);
  state.wanted.delete(id);
  saveFB();render();
}
function toggleWanted(id){
  if(state.wanted.has(id))state.wanted.delete(id);else state.wanted.add(id);
  state.owned.delete(id);
  saveFB();render();
}
function toggleFav(sid){
  if(state.favs.has(sid))state.favs.delete(sid);else state.favs.add(sid);
  saveFB();render();
}
function markAll(items){
  const allO=items.every(i=>state.owned.has(i.id));
  items.forEach(i=>{if(allO)state.owned.delete(i.id);else state.owned.add(i.id);state.wanted.delete(i.id);});
  saveFB();render();
}

function getS(set){const oc=set.items.filter(i=>state.owned.has(i.id)).length;const wc=set.items.filter(i=>state.wanted.has(i.id)).length;return{oc,wc,t:set.items.length,done:oc===set.items.length};}

// ═══ RENDER ═══
function h(tag,attrs,...ch){const el=document.createElement(tag);if(attrs)Object.entries(attrs).forEach(([k,v])=>{if(k==='onclick')el.addEventListener('click',v);else if(k==='class')el.className=v;else if(k==='style'&&typeof v==='object')Object.assign(el.style,v);else el.setAttribute(k,v);});ch.flat().forEach(c=>{if(typeof c==='string')el.appendChild(document.createTextNode(c));else if(c)el.appendChild(c);});return el;}

function render(){
  const app=document.getElementById('app');
  app.innerHTML='';
  if(!state.player){renderLogin(app);return;}

  const totalO=ALL_IDS.filter(id=>state.owned.has(id)).length;
  const totalW=ALL_IDS.filter(id=>state.wanted.has(id)).length;

  // Header
  const header=h('div',{class:'header'},
    h('div',{class:'logo'},h('span',{class:'logo-icon'},'⬡'),h('span',{class:'logo-text'},'SC BLUEPRINTS')),
    h('div',{class:'header-right'},
      h('span',{class:'player-badge'},state.player),
      h('span',{class:'stat-green'},String(totalO)),
      h('span',{class:'stat-dim'},'/'+TOTAL_BP),
      h('button',{class:'icon-btn',onclick:()=>{state.showTh=!state.showTh;render();}},'🎨'),
      h('button',{class:'icon-btn',onclick:()=>{state.player=null;if(fbRef)fbRef.off();fbRef=null;render();},style:{fontSize:'12px'}},'↩')
    )
  );
  app.appendChild(header);

  // Themes
  if(state.showTh){
    const themes=h('div',{class:'themes'});
    [['classic','🌑 Classic'],['light','☀️ Light'],['industrial','⚙️ Industrial'],['explorer','🌿 Explorer'],['tactical','🎯 Tactical'],['pyro','🔥 Pyro'],['military','🚀 UEE']].forEach(([k,l])=>{
      themes.appendChild(h('button',{class:'theme-btn',onclick:()=>{document.documentElement.className=k;localStorage.setItem('scbp_theme',k);state.showTh=false;render();}},l));
    });
    app.appendChild(themes);
  }

  // Progress
  const pctO=(totalO/TOTAL_BP*100);const pctW=(totalW/TOTAL_BP*100);
  const prog=h('div',{class:'progress'},
    h('div',{class:'progress-bar'},h('div',{class:'progress-gn',style:{width:pctO+'%'}}),h('div',{class:'progress-am',style:{width:pctW+'%'}})),
    h('div',{class:'progress-stats'},h('span',{style:{color:'var(--gn)'}},'✓ '+totalO),h('span',{style:{color:'var(--am)'}},'★ '+totalW),h('span',{},pctO.toFixed(1)+'%'))
  );
  app.appendChild(prog);

  // Tabs
  const tabs=h('div',{class:'tabs'});
  [['armor','🛡️ Armor',A_RAW.length],['weapons','🔫 Weapons',W_RAW.length],['ammo','📦 Ammo',AM_RAW.length]].forEach(([k,l,n])=>{
    tabs.appendChild(h('button',{class:'tab'+(state.tab===k?' active':''),onclick:()=>{state.tab=k;state.exp=null;render();}},l+' ('+n+')'));
  });
  app.appendChild(tabs);

  // Search
  const searchBar=h('div',{class:'search-bar'});
  const inp=h('input',{class:'search-input',placeholder:'Search...',value:state.search});
  inp.addEventListener('input',e=>{state.search=e.target.value;render();});
  searchBar.appendChild(inp);
  searchBar.appendChild(h('button',{class:'filter-btn'+(state.showFi?' active':''),onclick:()=>{state.showFi=!state.showFi;render();}},'▼'));
  app.appendChild(searchBar);

  // Filters
  if(state.showFi){
    const fi=h('div',{class:'filters'});
    const fOpts=state.tab==='ammo'?['All','Owned','Wanted','Untouched']:['All','Owned','Wanted','Untouched','Complete'];
    fOpts.forEach(o=>{fi.appendChild(h('button',{class:'fbtn'+(state.statusF===o?' active':''),onclick:()=>{state.statusF=o;render();}},o));});
    if(state.tab!=='ammo'){
      fi.appendChild(h('button',{class:'fbtn'+(state.incOnly?' active':''),onclick:()=>{state.incOnly=!state.incOnly;render();}},'Incomplete'));
      fi.appendChild(h('button',{class:'fbtn'+(state.favOnly?' active':''),onclick:()=>{state.favOnly=!state.favOnly;render();}},'★ Favs'));
    }
    fi.appendChild(h('button',{class:'fbtn',onclick:()=>{state.search='';state.statusF='All';state.incOnly=false;state.favOnly=false;render();}},'↺'));
    app.appendChild(fi);
  }

  // Content
  if(state.tab==='armor'||state.tab==='weapons'){
    let sets=state.tab==='armor'?ARMOR_SETS:WEAPON_SETS;
    if(state.search){const terms=state.search.toLowerCase().split(/\s+/);sets=sets.filter(s=>{const hay=[s.name,...s.items.map(i=>i.name)].join(' ').toLowerCase();return terms.every(t=>hay.includes(t));});}
    if(state.favOnly)sets=sets.filter(s=>state.favs.has(s.id));
    if(state.incOnly)sets=sets.filter(s=>{const st=getS(s);return st.oc<st.t;});
    if(state.statusF==='Owned')sets=sets.filter(s=>getS(s).oc>0);
    if(state.statusF==='Wanted')sets=sets.filter(s=>getS(s).wc>0);
    if(state.statusF==='Untouched')sets=sets.filter(s=>{const st=getS(s);return st.oc===0&&st.wc===0;});
    if(state.statusF==='Complete')sets=sets.filter(s=>getS(s).done);

    app.appendChild(h('div',{class:'count'},sets.length+' sets · '+sets.reduce((s,x)=>s+x.items.length,0)+' blueprints'));

    if(!sets.length){app.appendChild(h('div',{class:'empty'},h('div',{class:'empty-icon'},'🔍'),h('div',{class:'empty-text'},'Nothing found')));
    }else{
      sets.forEach(set=>{
        const st=getS(set);const isE=state.exp===set.id;const isF=state.favs.has(set.id);
        const row=h('div',{class:'set-row'+(isE?' expanded':'')});

        // Header
        const hdr=h('div',{class:'set-header',onclick:()=>{state.exp=isE?null:set.id;render();}});
        const info=h('div',{class:'set-info'});
        const nameRow=h('div',{style:{display:'flex',alignItems:'center',flexWrap:'wrap',gap:'4px'}});
        nameRow.appendChild(h('span',{class:'set-name'+(st.done?' done':'')},set.name));
        if(set.type)nameRow.appendChild(h('span',{class:'set-type'},set.type));
        if(st.done)nameRow.appendChild(h('span',{class:'set-complete'},'✓'));
        info.appendChild(nameRow);
        const dots=h('div',{class:'dots'});
        set.items.forEach(i=>{dots.appendChild(h('span',{class:'dot'+(state.owned.has(i.id)?' owned':state.wanted.has(i.id)?' wanted':'')}));});
        info.appendChild(dots);
        hdr.appendChild(info);

        const cnt=h('div',{class:'set-count'});
        cnt.appendChild(h('div',{class:'set-count-main'+(st.done?' done':'')},st.oc+'/'+st.t));
        if(st.wc>0)cnt.appendChild(h('div',{class:'set-count-wanted'},'★'+st.wc));
        hdr.appendChild(cnt);

        const favBtn=h('button',{class:'bb'+(isF?' active-am':''),onclick:e=>{e.stopPropagation();toggleFav(set.id);}},isF?'★':'☆');
        hdr.appendChild(favBtn);
        row.appendChild(hdr);

        // Detail
        if(isE){
          const det=h('div',{class:'set-detail'});
          const acts=h('div',{class:'set-actions'});
          acts.appendChild(h('button',{class:'bb'+(st.done?' active-gn':''),onclick:()=>markAll(set.items)},st.done?'↩ Unmark':'✓✓ All'));
          det.appendChild(acts);

          set.items.forEach(item=>{
            const isO=state.owned.has(item.id);const isW=state.wanted.has(item.id);
            const ir=h('div',{class:'item-row'});
            ir.appendChild(h('div',{class:'item-bar'+(isO?' owned':isW?' wanted':'')}));
            const nameEl=h('span',{class:'item-name'+(isO?' owned':isW?' wanted':''),onclick:e=>{e.stopPropagation();navigator.clipboard.writeText(item.name).then(()=>{nameEl.style.opacity='0.5';setTimeout(()=>{nameEl.style.opacity='1';},300);});}},item.name);
            nameEl.title='Tap to copy name';
            ir.appendChild(nameEl);
            ir.appendChild(h('button',{class:'bb'+(isO?' active-gn':''),onclick:()=>toggleOwned(item.id)},'✓'));
            ir.appendChild(h('button',{class:'bb'+(isW?' active-am':''),onclick:()=>toggleWanted(item.id)},'★'));
            det.appendChild(ir);
          });
          row.appendChild(det);
        }
        app.appendChild(row);
      });
    }
  }

  // Ammo tab
  if(state.tab==='ammo'){
    let list=AMMO_LIST;
    if(state.search){const terms=state.search.toLowerCase().split(/\s+/);list=list.filter(a=>terms.every(t=>a.name.toLowerCase().includes(t)));}
    if(state.statusF==='Owned')list=list.filter(a=>state.owned.has(a.id));
    if(state.statusF==='Wanted')list=list.filter(a=>state.wanted.has(a.id));
    if(state.statusF==='Untouched')list=list.filter(a=>!state.owned.has(a.id)&&!state.wanted.has(a.id));

    app.appendChild(h('div',{class:'count'},list.length+' ammo blueprints'));
    if(!list.length){app.appendChild(h('div',{class:'empty'},h('div',{class:'empty-icon'},'🔍'),h('div',{class:'empty-text'},'Nothing found')));
    }else{
      list.forEach(ammo=>{
        const isO=state.owned.has(ammo.id);const isW=state.wanted.has(ammo.id);
        const ir=h('div',{class:'item-row',style:{padding:'6px 16px'}});
        ir.appendChild(h('div',{class:'item-bar'+(isO?' owned':isW?' wanted':'')}));
        const nameEl=h('span',{class:'item-name'+(isO?' owned':isW?' wanted':''),onclick:()=>{navigator.clipboard.writeText(ammo.name).then(()=>{nameEl.style.opacity='0.5';setTimeout(()=>{nameEl.style.opacity='1';},300);});}},ammo.name);
        nameEl.title='Tap to copy name';
        ir.appendChild(nameEl);
        ir.appendChild(h('button',{class:'bb'+(isO?' active-gn':''),onclick:()=>toggleOwned(ammo.id)},'✓'));
        ir.appendChild(h('button',{class:'bb'+(isW?' active-am':''),onclick:()=>toggleWanted(ammo.id)},'★'));
        app.appendChild(ir);
      });
    }
  }

  // Footer
  app.appendChild(h('div',{class:'footer'},
    'SC Blueprint Tracker · '+TOTAL_BP+' blueprints · Alpha 4.7',
    h('br'),'Community tool · Not affiliated with CIG'
  ));
}

function renderLogin(app){
  const box=h('div',{class:'login-screen'},
    h('div',{class:'login-box'},
      h('div',{class:'login-icon'},'⬡'),
      h('div',{class:'login-title'},'SC Blueprint Tracker'),
      h('div',{class:'login-sub'},TOTAL_BP+' blueprints · Star Citizen 4.7'),
      h('div',{class:'login-label'},'Enter your nickname:')
    )
  );
  const inp=h('input',{class:'login-input',placeholder:'Your name...'});
  const btn=h('button',{class:'login-btn',onclick:()=>{
    const name=inp.value.trim();if(!name)return;
    state.player=name;localStorage.setItem('scbp_player',name);
    initFB(name);
  }},'Enter Tracker');
  inp.addEventListener('input',()=>{btn.className=inp.value.trim()?'login-btn ready':'login-btn';});
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){btn.click();}});
  box.firstChild.appendChild(inp);
  box.firstChild.appendChild(btn);
  box.firstChild.appendChild(h('div',{class:'login-hint'},'Each player tracks their own collection. Share this page with friends!'));
  app.appendChild(box);

  // Auto-login
  const last=localStorage.getItem('scbp_player');
  if(last){inp.value=last;btn.className='login-btn ready';}
}

// Init
const savedTheme=localStorage.getItem('scbp_theme');
if(savedTheme)document.documentElement.className=savedTheme;
render();
</script>
</body>
</html>
